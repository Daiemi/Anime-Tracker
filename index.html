<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой список аниме</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Мой список аниме</h1>

        <!-- Прогресс -->
        <div class="progress-container">
            <div class="progress-header">
                <span>Прогресс просмотра</span>
                <span id="progress-text">0%</span>
            </div>
            <div class="progress-bar">
                <div id="progress-fill"></div>
            </div>
        </div>

        <!-- Форма для добавления -->
        <div class="add-anime-form">
            <input type="text" id="anime-title" autocomplete="off" placeholder="Название аниме">
            <button id="add-button">Добавить</button>
        </div>

        <!-- Поиск --> 
        <input type="text" id="search-input" autocomplete="off" placeholder="Поиск аниме...">

         <!-- Фильтры -->
        <div class="filters">
            <button id="filter-all">Все</button>
            <button id="filter-watched">Просмотрено</button>
            <button id="filter-unwatched">Не просмотрено</button>
        </div>

        <!-- Селектор -->
        <div class="bulk-actions">
            <button id="mark-selected">Отметить просмотренными</button>
            <button id="unmark-selected">Отметить не просмотренными</button>
            <button id="delete-selected">Удалить выбранные</button>
            <button id="delete-all">Удалить все</button>
            <button id="select-all">Выбрать все</button>
        </div>

        <!-- Список аниме -->
        <ul id="anime-list"></ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
